name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GH_PAT }}

      - name: Configure git for private submodule
        run: git config --global url."https://${{ secrets.GH_PAT }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout submodules
        run: git submodule update --init --recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/VO2DataManager.Tests/VO2DataManager.Tests.csproj

      - name: Build
        run: dotnet build src/VO2DataManager.Tests/VO2DataManager.Tests.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test src/VO2DataManager.Tests/VO2DataManager.Tests.csproj --no-build --configuration Release --verbosity normal
